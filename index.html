<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>द्रोणाचार्य करिअर अकॅडमी</title>
    <link rel="icon" type="image/svg+xml" href="/images/logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Gotu&family=Noto+Sans+Devanagari&family=Hind&family=Caveat&display=swap"
      rel="stylesheet"
    />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' data: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://accounts.google.com https://apis.google.com https://checkout.razorpay.com https://unpkg.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://d1mhg19mxhvn2h.cloudfront.net http://localhost:5050 https://9gyxhs56h6.execute-api.us-east-1.amazonaws.com https://ropo15fgi2.execute-api.ap-south-1.amazonaws.com https://accounts.google.com https://oauth2.googleapis.com https://www.googleapis.com https://api.razorpay.com https://checkout.razorpay.com https://lumberjack.razorpay.com https://unpkg.com; frame-src 'self' https://accounts.google.com https://*.googleusercontent.com https://checkout.razorpay.com https://api.razorpay.com;"
    />

    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Gotu", sans-serif;
      }
      #desktop-blocker {
        display: none;
        height: 100vh;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        background-color: #f8f9fa;
        padding: 20px;
      }
      .blocker-icon {
        font-size: 60px;
        margin-bottom: 20px;
      }
      .blocker-title {
        color: #d32f2f;
        font-size: 24px;
        margin-bottom: 10px;
        font-weight: bold;
      }
      .blocker-msg {
        font-size: 18px;
        color: #333;
        line-height: 1.6;
        max-width: 500px;
      }
      .english-msg {
        margin-top: 20px;
        font-size: 14px;
        color: #666;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <div id="desktop-blocker">
      <div class="blocker-icon">📱</div>
      <div class="blocker-title">केवळ मोबाईलवर उपलब्ध</div>
      <div class="blocker-msg">
        ही वेबसाइट सध्या फक्त मोबाईल उपकरणांसाठी उपलब्ध आहे.
        <br /><br />
        <b>कृपया ही वेबसाइट उघडण्यासाठी तुमचा मोबाईल वापरा.</b>
      </div>
      <div class="english-msg">
        Access Restricted: This application is currently optimized only for
        Mobile devices.
      </div>
    </div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      (function () {
        const ua = navigator.userAgent;
        const platform = navigator.platform || "";

        const isWindows = /Win/i.test(platform) || /Windows/i.test(ua);
        const isMacDesktop =
          (/Mac/i.test(platform) || /Macintosh/i.test(ua)) &&
          navigator.maxTouchPoints <= 1;
        const isLinuxDesktop = /Linux/i.test(platform) && !/Android/i.test(ua);

        const isAndroid = /Android/i.test(ua);
        const isIOS = /iPhone|iPad|iPod/i.test(ua);

        let allowed = false;

        if (
          (isAndroid || isIOS) &&
          !isWindows &&
          !isMacDesktop &&
          !isLinuxDesktop
        ) {
          if (window.innerWidth <= 700) {
            allowed = true;
          }
        }

        if (isWindows || isMacDesktop) {
          allowed = false;
        }

        const rootEl = document.getElementById("root");
        const blockerEl = document.getElementById("desktop-blocker");

        if (!allowed) {
          console.error("Access Blocked: Not a mobile device.");
          if (rootEl) rootEl.style.display = "none";
          if (blockerEl) blockerEl.style.display = "flex";
          window.stop();
        } else {
          if (rootEl) rootEl.style.display = "block";
          if (blockerEl) blockerEl.style.display = "none";
        }
      })();
    </script>
  </body>
</html>
